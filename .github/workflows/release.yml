name: Release
on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - run: dotnet build -c Release

      - name: Pack
        run: |
          dotnet pack Clip/Clip.csproj -c Release /p:Version=$VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o pkg --no-build
          dotnet pack Clip.OpenTelemetry/Clip.OpenTelemetry.csproj -c Release /p:Version=$VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o pkg --no-build
          dotnet pack Clip.Extensions.Logging/Clip.Extensions.Logging.csproj -c Release /p:Version=$VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg -o pkg --no-build
          dotnet pack Clip.Analyzers/Clip.Analyzers.csproj -c Release /p:Version=$VERSION -o pkg --no-build

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: localhots

      - name: Push to NuGet.org
        run: dotnet nuget push 'pkg/*.nupkg' -s https://api.nuget.org/v3/index.json -k ${{steps.login.outputs.NUGET_API_KEY}} --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push 'pkg/*.nupkg' -s https://nuget.pkg.github.com/localhots/index.json -k ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Upload packages to release
        run: gh release upload "$GITHUB_REF_NAME" pkg/*.nupkg pkg/*.snupkg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
